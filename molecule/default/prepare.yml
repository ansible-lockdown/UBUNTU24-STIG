---

- name: Prepare
  hosts: all
  gather_facts: false

  tasks:
    - name: Install packages needed for STIG hardening in container
      ansible.builtin.apt:
        name:
          - openssh-server
          - libpam-pwquality
          - libpam-modules
          - sudo
          - acl
          - kmod
          - cron
          - chrony
          - rsyslog
          - aide
          - aide-common
          - logrotate
          - apparmor
          - apparmor-utils
          - ufw
          - nftables
          - auditd
          - autofs
          - python3-apt
        state: present
        update_cache: true

    - name: Create privilege-separation and config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /run/sshd
        - /etc/sysctl.d
        - /etc/ssh/sshd_config.d

    - name: Start and enable cron
      ansible.builtin.systemd:
        name: cron
        state: started
        enabled: true

    - name: Start and enable rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        state: started
        enabled: true
